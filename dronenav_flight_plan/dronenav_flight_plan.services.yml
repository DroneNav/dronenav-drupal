services:
  dronenav_flight_plan.submission_service:
    class: Drupal\dronenav_flight_plan\Service\FlightPlanSubmissionService
    arguments:
      - '@http_client'

  dronenav_flight_plan.validator:
    class: Drupal\dronenav_flight_plan\Service\FlightPlanValidator

  dronenav_flight_plan.flight_path_ordering:
    class: Drupal\dronenav_flight_plan\Service\FlightPathOrderingService
    arguments:
      - '@http_client'

  logger.channel.dronenav_flight_plan:
    parent: logger.channel_base
    arguments:
      - 'dronenav_flight_plan'

  dronenav_flight_plan.flight_execution:
    class: Drupal\dronenav_flight_plan\Service\FlightExecutionService
    arguments:
      - '@http_client'
      - '@logger.channel.dronenav_flight_plan'
      - 'https://api.dronenav.org'

  dronenav_flight_plan.flight_status_update:
    class: Drupal\dronenav_flight_plan\Service\FlightStatusUpdateService
    arguments:
      - '@entity_type.manager'
      - '@entity_field.manager'
      - '@logger.channel.dronenav_flight_plan'

